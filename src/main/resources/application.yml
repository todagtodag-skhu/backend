spring:
  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 200

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

app:
  oauth:
    apple:
      key-url: https://appleid.apple.com/auth/keys
      client-id: ${APPLE_CLIENT_ID}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-mill-second: 86400000
    refresh-token-expiration-mill-second: 1209600000
