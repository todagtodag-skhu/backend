name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar -x test

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/todagtodag-skhu/backend:latest \
            -t ghcr.io/todagtodag-skhu/backend:${IMAGE_TAG} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/todagtodag-skhu/backend:latest
          docker push ghcr.io/todagtodag-skhu/backend:${IMAGE_TAG}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euxo pipefail
            whoami
            hostname
            cd /home/ubuntu/todagtodag
            pwd
            ls -la
            docker compose pull
            docker compose up -d --force-recreate
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            docker inspect todagtodag-backend --format='{{.Image}}'
            docker image prune -f
