spring:
  datasource:
    url: jdbc:mysql://mysql:3306/todagtodag_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: Asia/Seoul

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 200

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

app:
  oauth:
    apple:
      key-url: https://appleid.apple.com/auth/keys
      client-id: ${APPLE_CLIENT_ID}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-mill-second: 86400000
    refresh-token-expiration-mill-second: 1209600000
